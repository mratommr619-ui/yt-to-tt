<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Luxury Spliter Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --dark: #0a0a0a; }
        body { 
            background: var(--dark); color: #fff; font-family: sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden; 
            padding: 70px 0; /* အပေါ်နဲ့အောက် Banner အတွက် နေရာစာန် */
        }
        .card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 25px; 
            border-radius: 20px; border: 1px solid rgba(191,149,63,0.3); 
            width: 90%; max-width: 380px; text-align: center; z-index: 10;
        }
        h2 { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; font-size: 20px; margin-bottom: 20px; }
        .step { display: none; flex-direction: column; gap: 15px; } .active { display: flex; }
        label { color: #bf953f; font-size: 11px; text-align: left; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(191,149,63,0.2); border-radius: 10px; color: #fff; box-sizing: border-box; outline: none; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 14px; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .skip-btn { background: transparent; color: #888; border: 1px solid #444; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 11px; margin-top: 5px; }
        
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .pos-btn { background: rgba(255,255,255,0.05); color: #888; border: 1px solid #333; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .pos-btn.selected { border-color: #bf953f; color: #fff; background: rgba(191, 149, 63, 0.3); }

        /* Banner Containers (Fixed) */
        #ad-top, #ad-bottom {
            position: fixed; left: 0; width: 100%; height: 60px;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        #ad-top { top: 0; border-bottom: 1px solid rgba(191,149,63,0.2); }
        #ad-bottom { bottom: 0; border-top: 1px solid rgba(191,149,63,0.2); }
    </style>
</head>
<body>

<div id="ad-top"></div>

<div class="card">
    <h2 id="title">Luxury Spliter</h2>

    <div id="step1" class="step active">
        <label id="l_link">Video Source Link</label>
        <input type="text" id="vLink" placeholder="https://...">
        <button class="btn-gold" id="bn1" onclick="v_link()">Next</button>
    </div>

    <div id="step2" class="step">
        <label id="l_name">Movie Name</label>
        <input type="text" id="vName" value="movie">
        <button class="btn-gold" id="bn2" onclick="next(3)">Next</button>
        <button class="skip-btn" id="bs_n" onclick="next(3)">Skip</button>
    </div>

    <div id="step3" class="step">
        <label id="l_time">Split Time</label>
        <input type="text" id="vLen" value="5:00">
        <button class="btn-gold" id="bn3" onclick="next(4)">Next</button>
        <button class="skip-btn" id="bs_t" onclick="next(4)">Skip</button>
    </div>

    <div id="step4" class="step">
        <label id="l_wm">Watermark</label>
        <input type="text" id="vWm" placeholder="...">
        <button class="btn-gold" id="bn4" onclick="next(5)">Next</button>
        <button class="skip-btn" id="bs_w" onclick="skip_wm()">Skip</button>
    </div>

    <div id="step5" class="step">
        <label id="l_logo">Brand Logo</label>
        <input type="file" id="vLogo" accept="image/*" onchange="h_file(this)">
        <div class="pos-grid">
            <button id="tl" class="pos-btn" onclick="setPos('tl', this)">TL</button>
            <button id="tr" class="pos-btn selected" onclick="setPos('tr', this)">TR</button>
            <button id="bl" class="pos-btn" onclick="setPos('bl', this)">BL</button>
            <button id="br" class="pos-btn" onclick="setPos('br', this)">BR</button>
        </div>
        <button id="finalBtn" class="btn-gold" onclick="h_process()">🚀 စတင်ဖြတ်မည်</button>
        <button class="skip-btn" id="bs_l" onclick="h_process()">Skip Logo</button>
    </div>
</div>

<div id="ad-bottom"></div>

<script>
    firebase.initializeApp({ projectId: "yttott-28862" });
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    const uid = tg.initDataUnsafe?.user?.id?.toString() || "1715890141";
    
    let logoData = "", selectedPos = "tr", userLang = "my", isPremiumUser = false;

    // Load Data & Ads
    db.collection('users').doc(uid).get().then(doc => {
        if(doc.exists) {
            const data = doc.data();
            userLang = data.lang || "my";
            isPremiumUser = data.is_premium || false;
            
            if (!isPremiumUser) {
                // Adsterra Social Bar Load
                const s = document.createElement('script');
                s.src = '//pl25785085.highratecpmgate.com/83/87/1b/83871b6938a164b3fdf89f92931c8172.js';
                document.head.appendChild(s);

                // Banner Placeholder Text (If you have banner code, paste it here)
                document.getElementById('ad-top').innerHTML = "<span style='font-size:10px; color:#555;'>TOP BANNER AD</span>";
                document.getElementById('ad-bottom').innerHTML = "<span style='font-size:10px; color:#555;'>BOTTOM BANNER AD</span>";
            } else {
                document.getElementById('ad-top').style.display = 'none';
                document.getElementById('ad-bottom').style.display = 'none';
                document.body.style.padding = '0';
            }
        }
        applyLang(userLang);
    }).catch(() => applyLang("my"));

    function applyLang(l) {
        const t = {
            en: { link: "Video Link", name: "Movie Name", time: "Split Time", wm: "Watermark", logo: "Logo Image", next: "Next", skip: "Skip", start: "🚀 START SPLIT" },
            my: { link: "ဗီဒီယိုလင့်ခ်", name: "ဇာတ်ကားအမည်", time: "ဖြတ်မည့်မိနစ်", wm: "Watermark စာသား", logo: "လိုဂိုတင်ရန်", next: "ရှေ့သို့", skip: "ကျော်မည်", start: "🚀 စတင်ဖြတ်မည်" }
        };
        const c = t[l] || t.my;
        document.getElementById('l_link').innerText = c.link; document.getElementById('l_name').innerText = c.name;
        document.getElementById('l_time').innerText = c.time; document.getElementById('l_wm').innerText = c.wm;
        document.getElementById('l_logo').innerText = c.logo;
        document.getElementById('bn1').innerText = c.next; document.getElementById('bn2').innerText = c.next;
        document.getElementById('bn3').innerText = c.next; document.getElementById('bn4').innerText = c.next;
        document.getElementById('bs_n').innerText = c.skip; document.getElementById('bs_t').innerText = c.skip;
        document.getElementById('bs_w').innerText = c.skip; document.getElementById('bs_l').innerText = c.skip;
        document.getElementById('finalBtn').innerText = c.start;
    }

    function v_link() { if(document.getElementById('vLink').value) next(2); else alert("Link Required!"); }
    function next(n) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById('step' + n).classList.add('active'); }
    function setPos(p, b) { selectedPos = p; document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('selected')); b.classList.add('selected'); }
    function skip_wm() { document.getElementById('vWm').value = ""; next(5); }
    function h_file(i) { const f = i.files[0]; if(f && f.size <= 1048576) { const r = new FileReader(); r.onload = (e) => { logoData = e.target.result; }; r.readAsDataURL(f); } }

    async function h_process() {
        const btn = document.getElementById('finalBtn');
        btn.disabled = true;
        await db.collection('tasks').add({
            user_id: uid, value: document.getElementById('vLink').value,
            name: document.getElementById('vName').value || "movie",
            len: document.getElementById('vLen').value || "5:00",
            logo_data: logoData, pos: selectedPos, wm: document.getElementById('vWm').value || "",
            status: 'pending', last_sent_index: -1, lang: userLang, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        tg.close();
    }
    tg.expand();
</script>
</body>
</html>
