name: Movie Splitting and Cloud Upload Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install System Dependencies (FFmpeg & Node.js)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs

      - name: Install Python Packages
        run: |
          pip install firebase-admin requests tiktok-uploader
          # YouTube Block များကို ကျော်ရန် yt-dlp ၏ နောက်ဆုံးထွက် Master Code ကို သွင်းခြင်း
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.zip

      - name: Run Bot
        run: python bot.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
