name: Telegram Continuous Auto-Queue Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_bot]
  # အလုပ်ရှိရင် ၁ နာရီတစ်ခါ ပွင့်စစ်ပေးဖို့ schedule ထည့်ထားပေးတယ် (Optional)
  schedule:
    - cron: '0 * * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub API ကို လှမ်းခေါ်ဖို့ ခွင့်ပြုချက် ပေးထားခြင်း
    permissions:
      contents: write
      actions: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Packages
        run: |
          pip install firebase-admin requests yt-dlp

      - name: Run Bot
        run: python bot.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
