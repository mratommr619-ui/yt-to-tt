name: YouTube to TikTok Bot

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

concurrency:
  group: tiktok-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser python3-pip
          # yt-dlp အသစ်ဆုံးကို သွင်းပြီး Update လုပ်မယ်
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo /usr/local/bin/yt-dlp -U

      - name: Install Dependencies
        run: npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer firebase-admin

      - name: Run Bot
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          YT_COOKIES_DATA: ${{ secrets.YOUTUBE_COOKIES }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_EXECUTABLE_PATH: '/usr/bin/chromium-browser'
        run: |
          echo "$YT_COOKIES_DATA" > youtube_cookies.txt
          node bot.js
