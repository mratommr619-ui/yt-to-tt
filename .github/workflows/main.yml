name: YouTube to TikTok Bot (OAuth2 Mode)

on:
  schedule:
    - cron: '*/30 * * * *' # ၃၀ မိနစ်တစ်ခါ Run မည်
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser python3-pip
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo /usr/local/bin/yt-dlp -U

      - name: Install Dependencies
        run: npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer firebase-admin

      # 🔥 Cache စနစ် - ဒါက Login ဝင်ထားတာကို မှတ်ထားပေးမှာပါ
      - name: Cache YouTube Auth
        uses: actions/cache@v3
        with:
          path: ~/.cache/yt-dlp
          key: ${{ runner.os }}-yt-dlp-auth

      - name: Run Bot
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_EXECUTABLE_PATH: '/usr/bin/chromium-browser'
        run: node bot.js
