name: Movie Splitting and Cloud Upload Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs

      - name: Install Python Packages & Playwright Browser
        run: |
          pip install -r requirements.txt
          # TikTok အတွက် လိုအပ်သော Chromium Browser ကိုသာ တိုက်ရိုက်သွင်းခြင်း
          playwright install --with-deps chromium

      - name: Run Bot
        run: python bot.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
