name: Video Splitter and TikTok Uploader

on:
  schedule:
    - cron: '*/30 * * * *' # ၃၀ မိနစ်တစ်ခါ Run မည်
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Install Dependencies
        run: npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer firebase-admin

      - name: Run Bot
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_EXECUTABLE_PATH: '/usr/bin/chromium-browser'
        run: node bot.js
