name: YouTube to TikTok Bot

on:
  schedule:
    - cron: '*/30 * * * *' # မိနစ် ၃၀ တစ်ခါ အလုပ်လုပ်မည်
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg google-chrome-stable
          npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer firebase-admin yt-dlp-exec

      - name: Run Bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: node bot.js
