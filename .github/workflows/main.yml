name: YouTube to TikTok Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg google-chrome-stable

      - name: Install Dependencies
        run: npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer firebase-admin yt-dlp-exec

      - name: Run Bot
        env:
          # 🔥 Secrets တွေကို Bot သိအောင် ချိတ်ဆက်ခြင်း
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node bot.js
