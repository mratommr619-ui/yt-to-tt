name: Telegram Continuous Auto-Queue Bot

on:
  workflow_dispatch:
  repository_dispatch: # Bot က ပြန်နှိုးလျှင် လက်ခံရန်
    types: [restart_bot]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Bot
        run: python bot.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # ပြန်နှိုးရန် လိုအပ်သည်
