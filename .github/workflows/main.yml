name: Movie Splitting and Cloud Upload Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Monitor အတု (xvfb) ကို ထပ်ပေါင်းထည့်လိုက်ပါပြီ
      - name: Install System Dependencies (FFmpeg & Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs xvfb

      - name: Install Python Packages & Playwright Browser
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # xvfb-run ဖြင့် Monitor အတုထဲတွင် python bot.py ကို Run မည်
      - name: Run Bot
        run: xvfb-run --auto-servernum python bot.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
