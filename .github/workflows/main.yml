name: Video Processor
on:
  schedule:
    - cron: '*/15 * * * *' # ၁၅ မိနစ်တစ်ခါ အလိုအလျောက် နိုးမည်
  workflow_dispatch: # Manual နှိပ်ပြီး Run လို့ရအောင် ထည့်ထားသည်

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          pip install pyrogram tgcrypto firebase-admin requests yt-dlp gdown python-telegram-bot

      - name: Run Video Processor
        run: python bot.py
        env:
          # GitHub Secrets ထဲမှာ ဒီနာမည်တွေအတိုင်း သေချာထည့်ထားပေးပါ
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
